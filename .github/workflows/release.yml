name: Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_to_npm:
        description: "Publish the assembled npm package with provenance"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: npm test
      - run: npm run docs:check

  package:
    name: Package ${{ matrix.platform }}
    needs: quality
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            node_platform: linux
            node_arch: x64
          - platform: darwin-arm64
            os: macos-latest
            node_platform: darwin
            node_arch: arm64
          - platform: win32-x64
            os: windows-latest
            node_platform: win32
            node_arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
      - run: npm --workspace vrt run build:binary
      - run: npm --workspace vrt run stage:binary -- --platform=${{ matrix.node_platform }} --arch=${{ matrix.node_arch }}
      - name: Verify staged binary layout
        shell: bash
        run: |
          ls -la packages/vrt/bin
          ls -la packages/vrt/bin/${{ matrix.node_platform }}-${{ matrix.node_arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: vrt-binary-${{ matrix.platform }}
          path: packages/vrt/bin/${{ matrix.node_platform }}-${{ matrix.node_arch }}

  assemble:
    name: Assemble npm package
    needs: package
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/download-artifact@v4
        with:
          name: vrt-binary-linux-x64
          path: packages/vrt/bin/linux-x64
      - uses: actions/download-artifact@v4
        with:
          name: vrt-binary-darwin-arm64
          path: packages/vrt/bin/darwin-arm64
      - uses: actions/download-artifact@v4
        with:
          name: vrt-binary-win32-x64
          path: packages/vrt/bin/win32-x64
      - name: Restore executable bits
        run: chmod +x packages/vrt/bin/*/vrt || true
      - name: Verify aggregated binary layout
        run: |
          test -x packages/vrt/bin/linux-x64/vrt
          test -x packages/vrt/bin/darwin-arm64/vrt
          test -f packages/vrt/bin/win32-x64/vrt.exe
      - run: npm pack --workspace vrt
      - uses: actions/upload-artifact@v4
        with:
          name: vrt-npm-package
          path: vrt-*.tgz

  publish:
    name: Publish npm package
    needs: assemble
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_to_npm == 'true'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          name: vrt-npm-package
      - run: npm publish vrt-*.tgz --provenance --access public

  homebrew:
    name: Bump Homebrew formula
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Bump formula to ${{ github.ref_name }}
        run: node scripts/bump-homebrew-formula.mjs --version "${{ github.ref_name }}"
      - name: Commit formula update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/vrt.rb; then
            echo "Formula already up to date for ${{ github.ref_name }}"
          else
            git add Formula/vrt.rb
            git commit -m "chore: bump Homebrew formula to ${{ github.ref_name }}"
            git push origin HEAD:main
          fi
